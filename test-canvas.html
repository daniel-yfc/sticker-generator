<!DOCTYPE html>
<html>
<head>
<title>Canvas Test</title>
</head>
<body>
<canvas id="canvas" width="400" height="400"></canvas>
<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const CANVAS_SIZE = 400;

  // Baseline
  const t0 = performance.now();
  for (let k = 0; k < 1000; k++) {
    const patternSize = 20;
    ctx.fillStyle = '#f0f0f0';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ddd';
    for (let i = 0; i < canvas.width; i += patternSize) {
      for (let j = 0; j < canvas.height; j += patternSize) {
        if ((i / patternSize + j / patternSize) % 2 === 0) {
          ctx.fillRect(i, j, patternSize, patternSize);
        }
      }
    }
  }
  const t1 = performance.now();
  console.log(`Baseline loops: ${t1 - t0} ms`);

  // Optimized offscreen
  const patternCanvas = document.createElement('canvas');
  patternCanvas.width = 40;
  patternCanvas.height = 40;
  const pCtx = patternCanvas.getContext('2d');
  pCtx.fillStyle = '#f0f0f0';
  pCtx.fillRect(0, 0, 40, 40);
  pCtx.fillStyle = '#ddd';
  pCtx.fillRect(0, 0, 20, 20);
  pCtx.fillRect(20, 20, 20, 20);
  const pattern = ctx.createPattern(patternCanvas, 'repeat');

  const t2 = performance.now();
  for (let k = 0; k < 1000; k++) {
    ctx.fillStyle = pattern;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  const t3 = performance.now();
  console.log(`Optimized createPattern: ${t3 - t2} ms`);
</script>
</body>
</html>
